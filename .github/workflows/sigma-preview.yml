name: Sigma Preview (manual)

# Temporary workflow: runs scripts/preview_slack.py to post a dummy alert
# batch to Slack so we can eyeball the new subcategory formatting.
# Deleted immediately after use.

on:
  workflow_dispatch:

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Post sample to Slack
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: python scripts/preview_slack.py
