name: Sigma Screener — Open

on:
  schedule:
    # 9:35 AM EST / 10:35 AM EDT = 14:35 UTC
    # Uses EST-aligned offset so the run always fires after the 9:30 AM ET
    # market open, regardless of daylight saving time. During EDT months
    # this runs at 10:35 AM ET — one hour later than ideal but guarantees
    # today's opening bar is available from Yahoo Finance.
    - cron: '35 14 * * 1-5'
  workflow_dispatch:  # manual trigger for testing

jobs:
  screen-open:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sigma screener (open mode)
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: python scripts/sigma_screener.py --mode open
