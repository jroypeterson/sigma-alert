name: Refresh S&P 500

on:
  # 1st of each month, 10:00 AM ET = 14:00 UTC (15:00 during EST)
  schedule:
    - cron: '0 14 1 * *'
  workflow_dispatch:  # manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pandas requests lxml

      - name: Refresh S&P 500 constituents
        run: python scripts/refresh_sp500.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sources/sp500.txt
          git diff --cached --quiet || git commit -m "Refresh S&P 500 constituents (monthly) [skip ci]"
          git push

      - name: Re-sync watchlist
        run: python scripts/sync_watchlist.py

      - name: Commit watchlist if changed
        run: |
          git add watchlist.txt
          git diff --cached --quiet || git commit -m "Sync watchlist after S&P 500 refresh [skip ci]"
          git push
